[neut]
number_of_events = 100000 # the number of probe interactions to simulate

# verbosity = "quiet"
verbosity = "very_quiet"

rng_seed = "time"

output_format = "neutroot"
# output_format = "NuHepMC"

simulation_mode = "neutrino" # This option includes electron scattering

[neut.vertex]
position_type = "origin" # place the vertex at [0.0, 0.0, 0.0]

[neut.probe]
# must be one of numu(bar), nue(bar), nutau(bar), electron
species = "numu"
throwinke = "false"

# direction_type options:
direction_type = "fixed" # probe approaches target along [0.0, 0.0, 1.0]
direction = [0.0, 0.0, 1.0]

energy_spectrum_type = "root"
energy_histogram = [ "fluxes/t2kflux_2016_plus250kA.root", "enu_nd280_numu", "gev"]

[neut.target]
# example for carbon
num_nucleons = 12
num_bound_protons = 6
num_free_protons = 0

[neut.target.hadron_rescattering]
nucleon_rescattering = "off"

[neut.target.nuclear_effects]
fermi_motion = "off"
pauli_blocking = "on"

nucleon_absorption_and_pion_ejection = "off"
deexcitation = "off"

[neut.interaction_model]
#mode_choice_type = "normal" # choose according to nominal cross-section prediction
mode_choice_type = "rescaled" # read mode rescaling's from neut.interaction_model.mode_rescaling table

[neut.interaction_model.mode_rescaling]
# quotes required for keys with +/- characters
"CC_QE_nu" = 1.0
"CC_2p2h_nu" = 0.0
"CC_RES_ppi+_nu" = 0.0
"CC_RES_ppi0_nu" = 0.0
"CC_RES_npi+_nu" = 0.0
"CC_COH_nu" = 0.0
"CC_DIF_nu" = 0.0
"CC_eta_nu" = 0.0
"CC_kaon_nu" = 0.0
"CC_1gamma_nu" = 0.0
"CC_multi_pi_nu" = 0.0
"CC_DIS_nu" = 0.0

"NC_elastic_free_p_nu" = 0.0
"NC_elastic_bound_p_nu" = 0.0
"NC_elastic_n_nu" = 0.0
"NC_RES_npi0_nu" = 0.0
"NC_RES_ppi0_nu" = 0.0
"NC_RES_ppi-_nu" = 0.0
"NC_RES_npi+_nu" = 0.0
"NC_COH_nu" = 0.0
"NC_DIF_nu" = 0.0
"NC_eta_n_nu" = 0.0
"NC_eta_p_nu" = 0.0
"NC_kaon_n_nu" = 0.0
"NC_kaon_p_nu" = 0.0
"NC_multi_pi_nu" = 0.0
"NC_1gamma_n_nu" = 0.0
"NC_1gamma_p_nu" = 0.0
"NC_DIS_nu" = 0.0

"CC_QE_free_proton_nubar" = 0.0
"CC_QE_bound_proton_nubar" = 0.0
"CC_2p2h_nubar" = 0.0
"CC_RES_npi-_nubar" = 0.0
"CC_RES_ppi0_nubar" = 0.0
"CC_RES_ppi-_nubar" = 0.0
"CC_COH_nubar" = 0.0
"CC_DIF_nubar" = 0.0
"CC_eta_nubar" = 0.0
"CC_kaon_nubar" = 0.0
"CC_1gamma_nubar" = 0.0
"CC_multi_pi_nubar" = 0.0
"CC_DIS_nubar" = 0.0

"NC_elastic_free_p_nubar" = 0.0
"NC_elastic_bound_p_nubar" = 0.0
"NC_elastic_n_nubar" = 0.0
"NC_RES_npi0_nubar" = 0.0
"NC_RES_ppi0_nubar" = 0.0
"NC_RES_ppi-_nubar" = 0.0
"NC_RES_npi+_nubar" = 0.0
"NC_COH_nubar" = 0.0
"NC_DIF_nubar" = 0.0
"NC_eta_n_nubar" = 0.0
"NC_eta_p_nubar" = 0.0
"NC_kaon_n_nubar" = 0.0
"NC_kaon_p_nubar" = 0.0
"NC_1gamma_n_nubar" = 0.0
"NC_1gamma_p_nubar" = 0.0
"NC_multi_pi_nubar" = 0.0
"NC_DIS_nubar" = 0.0


[neut.interaction_model.QE]
#model = "nieves" # Nieves et. al LFG model
model = "rome" # Benhar SF

[neut.interaction_model.QE.axial_form_factors]
form = "dipole"
# form = "BBBA07"
# form = "two_component"
# form = "three_component"
# form = "z_expansion"

# Axial mass for dipole form factor
[neut.interaction_model.QE.axial_form_factors.dipole]
axial_mass = 1.03
nc_axial_mass = 1.21
